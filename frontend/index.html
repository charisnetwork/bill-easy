        <!-- ===== Structured Data (JSON-LD) ===== -->
        <script type="application/ld+json">

          "@context": "https://schema.org",

          "name": "Bill Easy",

        }

        <!-- ===== Fonts ===== -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link rel="icon" href="/favicon.ico" />

        <link rel="manifest" href="/manifest.json" />

        <!-- ===== Google Analytics 4 ===== -->
        <!-- Set VITE_GA_MEASUREMENT_ID=G-XXXXXXXXXX in your Cloudflare environment variables -->
        <script>
          (function() {
            var gaId = '%VITE_GA_MEASUREMENT_ID%';
            // The placeholder is replaced at build time by Vite.
            // If the ID is missing or still the placeholder, skip GA.
            if (!gaId || gaId === '%VITE_GA_MEASUREMENT_ID%' || !gaId.startsWith('G-')) return;
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            window.gtag = function() { window.dataLayer.push(arguments); };
            window.gtag('js', new Date());
            window.gtag('config', gaId, { send_page_view: false }); // Page views sent by React hook
          })();
        </script>

        <!-- ===== Razorpay ===== -->
        <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

        <!-- ===== Suppress noisy DOMException from browser extensions ===== -->
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
